services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: oblihub
      POSTGRES_USER: oblihub
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oblihub"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  server:
    image: meejay/oblihub-server:${OBLIHUB_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://oblihub:${DB_PASSWORD:-changeme}@postgres:5432/oblihub
      SESSION_SECRET: ${SESSION_SECRET:-change-this-in-production}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin123}
      DOCKER_SOCKET: /var/run/docker.sock
      ALLOW_CONSOLE: ${ALLOW_CONSOLE:-false}
      ALLOW_STACK: ${ALLOW_STACK:-false}
      ALLOW_NGINX: ${ALLOW_NGINX:-false}
      STACKS_DIR: /data/stacks
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - stacks_data:/data/stacks
      - proxy_data:/data/stacks/_proxy

  client:
    image: meejay/oblihub-client:${OBLIHUB_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${LISTEN_PORT:-3100}:80"

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    labels:
      oblihub.proxy: "true"
    ports:
      - "${PROXY_HTTP_PORT:-80}:80"
      - "${PROXY_HTTPS_PORT:-443}:443"
    volumes:
      - proxy_data:/etc/nginx
    command: >
      sh -c "
        mkdir -p /etc/nginx/conf.d /etc/nginx/stream.d /etc/nginx/certs /etc/nginx/acme-challenge /etc/nginx/htpasswd &&
        if [ ! -f /etc/nginx/nginx.conf ]; then
          echo 'events { worker_connections 1024; } http { server { listen 80 default_server; location / { return 444; } } }' > /etc/nginx/nginx.conf;
        fi &&
        nginx -g 'daemon off;'
      "
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  stacks_data:
  proxy_data:
